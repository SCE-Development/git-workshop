<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Recipe</title>
</head>
<body>
  <h1>Classic Black Coffee</h1>
  <p>A simple, perfect cup of black coffee.</p>

  <h2>Ingredients</h2>
  <ul>
    <li>2 tbsp ground coffee</li>
    <li>1 cup water</li>
  </ul>

  <h2>Instructions</h2>
  <ol>
    <li>Boil the water.</li>
    <li>Add ground coffee to your filter or French press.</li>
    <li>Pour hot water over the grounds.</li>
    <li>Let it brew for 4 minutes.</li>
    <li>Pour and enjoy!</li>
  </ol>
</body>
</html>
