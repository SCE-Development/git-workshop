<h1>Avocado Toast with Eggs</h1>

<h2>Ingredients</h2>
<ul>
    <li>2 slices bread</li>
    <li>1 avocado</li>
    <li>2 eggs</li>
    <li>Salt</li>
    <li>Pepper</li>
</ul>

<h2>Instructions</h2>
<ol>
    <li>Toast the bread.</li>
    <li>Mash the avocado and spread it on the toast.</li>
    <li>Cook the eggs.</li>
    <li>Place eggs on top of the toast.</li>
    <li>Add salt and pepper.</li>
</ol>
